services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./real-time-inventory-system-main/backend
      args:
        APP_VERSION: ${APP_VERSION:-ocr-rule-library-20260501}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4000
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr-service:8001}
    depends_on:
      postgres:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    volumes:
      - ./real-time-inventory-system-main/backend/storage:/app/storage

  ocr-service:
    platform: ${OCR_PLATFORM:-linux/amd64}
    build:
      context: ./ocr-service
    restart: unless-stopped
    volumes:
      - ./ocr-service/.paddlex:/root/.paddlex
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_VERSION: ${APP_VERSION:-ocr-rule-library-20260501}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  inventory_postgres_data:
